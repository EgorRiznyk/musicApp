<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#121212" />
  <meta name="description" content="CarRadio — музыка в машину" />
  <title>CarRadio</title>
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo"><i class="fas fa-headphones"></i><span>CarRadio</span></div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" id="navHome"><i class="fas fa-home"></i><span>Главная</span></a>
      </nav>
      <div class="sidebar-playlists">
        <p class="sidebar-label">Авто</p>
        <div class="playlist-list">
          <a href="#" class="playlist-item" id="quickDrive"><i class="fas fa-car"></i> Режим вождения</a>
        </div>
        <div class="sidebar-divider"></div>
        <button class="drive-btn" id="driveBtn"><i class="fas fa-car"></i> В путь!</button>
      </div>
    </aside>

    <main class="main-content" id="mainContent">
      <div class="topbar">
        <button class="topbar-nav-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
        <span class="topbar-title">CarRadio</span>
      </div>

      <div class="content">
        <div class="section-header"><h1>Ваш плейлист</h1><span class="badge" id="trackCount">13 треков</span></div>
        <div class="results-grid" id="libraryGrid"></div>
      </div>
    </main>

    <!-- Player -->
    <footer class="player-bar" id="playerBar" style="display:none">
      <div class="player-track">
        <div class="player-thumb-wrap">
          <div class="player-thumb" id="playerThumb"></div>
          <div class="vinyl" id="vinylDisc"><i class="fas fa-compact-disc"></i></div>
          <div class="equalizer" id="equalizer"><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="player-info">
          <div class="player-title" id="playerTitle">Название</div>
          <div class="player-channel" id="playerChannel">Исполнитель</div>
        </div>
        <button class="fav-btn" id="favBtn"><i class="far fa-heart"></i></button>
      </div>
      <div class="player-center">
        <div class="player-controls">
          <button class="ctrl-btn" id="shuffleBtn"><i class="fas fa-random"></i></button>
          <button class="ctrl-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
          <button class="ctrl-btn play-ctrl" id="playBtn"><i class="fas fa-play"></i></button>
          <button class="ctrl-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
          <button class="ctrl-btn" id="repeatBtn"><i class="fas fa-repeat"></i></button>
        </div>
        <div class="player-progress">
          <span class="time" id="currentTime">0:00</span>
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-tooltip" id="progressTooltip">0:00</div>
          </div>
          <span class="time" id="totalTime">0:00</span>
        </div>
      </div>
      <div class="player-extra">
        <div class="volume-wrap">
          <button class="ctrl-btn" id="volumeBtn"><i class="fas fa-volume-up"></i></button>
          <div class="volume-slider" id="volumeSlider"><div class="volume-fill" id="volumeFill"></div></div>
        </div>
      </div>
    </footer>
  </div>

  <div class="drive-overlay" id="driveOverlay">
    <div class="drive-header">
      <button class="drive-exit" id="driveExit"><i class="fas fa-chevron-down"></i></button>
      <span class="drive-title"><i class="fas fa-car"></i> Drive</span>
      <div></div>
    </div>
    <div class="speedo-wrap">
      <div class="speedometer">
        <div class="speedo-bg"></div>
        <div class="speedo-ticks" id="speedoTicks"></div>
        <div class="speedo-needle" id="speedoNeedle"></div>
        <div class="speedo-needle-glow" id="speedoGlow"></div>
        <div class="speedo-center"></div>
        <div class="speedo-info">
          <div class="speedo-speed" id="speedoReadout">0</div>
          <div class="speedo-unit">км/ч</div>
          <div class="speedo-thumb" id="driveThumb"></div>
          <div class="speedo-track" id="driveTrackTitle">Загрузка...</div>
          <div class="speedo-channel" id="driveTrackChannel"></div>
          <div class="speedo-time" id="driveTime">0:00 / 0:00</div>
        </div>
      </div>
    </div>
    <div class="drive-controls">
      <button class="drive-ctrl drive-fav-action" id="driveFav"><i class="far fa-heart"></i></button>
      <button class="drive-ctrl" id="drivePrev"><i class="fas fa-step-backward"></i></button>
      <button class="drive-ctrl drive-play-btn" id="drivePlay"><i class="fas fa-play"></i></button>
      <button class="drive-ctrl" id="driveNext"><i class="fas fa-step-forward"></i></button>
      <button class="drive-ctrl" id="driveShuffle"><i class="fas fa-random"></i></button>
    </div>
  </div>

  <div class="spinner" id="spinner">
    <div class="spinner-ring"></div>
  </div>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(function(){});
    }
  </script>
</body>
</html>
